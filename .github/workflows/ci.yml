name: CI

on:
  push:
  pull_request:

jobs:
  no-browser:
    name: No-browser gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show runtime
        run: |
          node --version
          npm --version

      - name: Run no-browser gates
        run: npm run test:ci:no-browser

  browser:
    name: Browser gates
    runs-on: ubuntu-latest
    needs: no-browser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show runtime
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run browser gates and review evidence
        run: npm run test:ci:browser
        env:
          HOSTED_DEMO_EVIDENCE_DIR: hosted-demo-evidence
          VISUAL_AUDIT_EVIDENCE_DIR: visual-audit-evidence

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hosted-demo-evidence
          path: hosted-demo-evidence
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-audit-evidence
          path: visual-audit-evidence
          if-no-files-found: warn
