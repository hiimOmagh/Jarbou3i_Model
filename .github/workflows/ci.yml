name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-browser:
    name: No-browser gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show runtime
        run: |
          node --version
          npm --version

      - name: Run no-browser gates
        run: npm run test:ci:no-browser

  browser:
    name: Browser gates
    runs-on: ubuntu-latest
    needs: no-browser
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Show runtime
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run browser gates and review evidence
        run: npm run test:ci:browser
        env:
          PLAYWRIGHT_WORKERS: 2
          HOSTED_DEMO_EVIDENCE_DIR: hosted-demo-evidence
          VISUAL_AUDIT_EVIDENCE_DIR: visual-audit-evidence

      - uses: actions/upload-artifact@v5
        if: ${{ always() && hashFiles('hosted-demo-evidence/**') != '' }}
        with:
          name: hosted-demo-evidence
          path: hosted-demo-evidence
          if-no-files-found: warn

      - uses: actions/upload-artifact@v5
        if: ${{ always() && hashFiles('visual-audit-evidence/**') != '' }}
        with:
          name: visual-audit-evidence
          path: visual-audit-evidence
          if-no-files-found: warn

      - uses: actions/upload-artifact@v5
        if: ${{ failure() && hashFiles('test-results/**', 'playwright-report/**') != '' }}
        with:
          name: browser-debug
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  deploy-pages:
    name: Deploy accepted GitHub Pages build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: browser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Build explicit static deployment artifact
        run: node scripts/build-pages-artifact.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/pages

      - name: Deploy accepted commit
        id: deployment
        uses: actions/deploy-pages@v4
